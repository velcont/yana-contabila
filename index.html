    <!-- ANTI-CACHE: Forțează browser-ul să ceară versiunea nouă -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA VERSION CHECK: Rulează ÎNAINTE de React pentru a curăța cache-uri vechi -->
    <script>
      (function() {
        var BUILD_VERSION = '__BUILD_VERSION__';
        var storedVersion = localStorage.getItem('yana_app_version');
        
        // Dacă versiunea stocată e diferită de cea curentă (utilizator nou sau versiune veche)
        if (storedVersion !== BUILD_VERSION) {
          console.log('[PWA_VERSION] Version mismatch: stored=' + storedVersion + ', build=' + BUILD_VERSION);
          
          // Curăță Service Worker-uri
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              registrations.forEach(function(registration) {
                registration.unregister();
                console.log('[PWA_VERSION] Unregistered SW:', registration.scope);
              });
            });
          }
          
          // Curăță toate cache-urile
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(name) { 
                caches.delete(name);
                console.log('[PWA_VERSION] Deleted cache:', name);
              });
            });
          }
          
          // Salvează versiunea nouă ÎNAINTE de reload pentru a preveni loop infinit
          localStorage.setItem('yana_app_version', BUILD_VERSION);
          
          // Forțează reload pentru TOȚI utilizatorii cu versiune diferită (inclusiv noi)
          // Nu e loop infinit pentru că am salvat BUILD_VERSION deja
          if (storedVersion !== null) {
            // Utilizator existent cu versiune veche - reload
            console.log('[PWA_VERSION] Existing user - forcing reload for version update');
            window.location.reload();
          } else {
            // Utilizator NOU - primul load, cache-urile au fost curățate, nu e nevoie de reload
            console.log('[PWA_VERSION] New user - caches cleared, no reload needed');
          }
        }
      })();
    </script>
