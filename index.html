    <!-- ANTI-CACHE: Forțează browser-ul să ceară versiunea nouă -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA VERSION CHECK: Rulează ÎNAINTE de React pentru a curăța cache-uri vechi -->
    <script>
      (function() {
        var BUILD_VERSION = '__BUILD_VERSION__';
        var storedVersion = localStorage.getItem('yana_app_version');
        
        // Anti-loop: verificăm dacă am făcut refresh recent (în ultimele 10 secunde)
        var lastRefresh = parseInt(localStorage.getItem('yana_last_refresh') || '0');
        var now = Date.now();
        var isRecentRefresh = (now - lastRefresh) < 10000; // 10 secunde guard
        
        // Dacă versiunea stocată e diferită de cea curentă și nu e refresh recent
        if (storedVersion !== BUILD_VERSION && !isRecentRefresh) {
          console.log('[PWA_VERSION] Version mismatch: stored=' + storedVersion + ', build=' + BUILD_VERSION);
          
          // Salvăm timestamp-ul refresh-ului pentru anti-loop
          localStorage.setItem('yana_last_refresh', now.toString());
          // Salvăm versiunea nouă ÎNAINTE de orice altceva pentru a preveni loop infinit
          localStorage.setItem('yana_app_version', BUILD_VERSION);
          
          // Colectăm toate promisiunile de curățare
          var cleanupPromises = [];
          
          // Curăță Service Worker-uri
          if ('serviceWorker' in navigator) {
            cleanupPromises.push(
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                return Promise.all(registrations.map(function(registration) {
                  console.log('[PWA_VERSION] Unregistering SW:', registration.scope);
                  return registration.unregister();
                }));
              }).catch(function(err) {
                console.log('[PWA_VERSION] SW cleanup error:', err);
              })
            );
          }
          
          // Curăță toate cache-urile
          if ('caches' in window) {
            cleanupPromises.push(
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(name) { 
                  console.log('[PWA_VERSION] Deleting cache:', name);
                  return caches.delete(name);
                }));
              }).catch(function(err) {
                console.log('[PWA_VERSION] Cache cleanup error:', err);
              })
            );
          }
          
          // După ce toate cache-urile sunt curățate, facem reload HARD (bypass cache)
          if (cleanupPromises.length > 0) {
            Promise.all(cleanupPromises).then(function() {
              console.log('[PWA_VERSION] All caches cleared, hard reloading...');
              // Hard reload cu bypass cache complet
              window.location.href = window.location.href.split('?')[0] + '?_v=' + BUILD_VERSION;
            });
          } else {
            console.log('[PWA_VERSION] No caches to clear, hard reloading...');
            window.location.href = window.location.href.split('?')[0] + '?_v=' + BUILD_VERSION;
          }
        } else if (storedVersion !== BUILD_VERSION && isRecentRefresh) {
          // Am făcut refresh recent dar versiunea tot nu s-a actualizat - salvăm și continuăm
          console.log('[PWA_VERSION] Recent refresh detected, saving version and continuing');
          localStorage.setItem('yana_app_version', BUILD_VERSION);
        }
      })();
    </script>
