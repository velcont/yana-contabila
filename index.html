    <!-- ANTI-CACHE: Forțează browser-ul să ceară versiunea nouă -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- PWA VERSION CHECK: Rulează ÎNAINTE de React pentru a curăța cache-uri vechi -->
    <script>
      (function() {
        var BUILD_VERSION = '__BUILD_VERSION__';
        var storedVersion = localStorage.getItem('yana_app_version');
        
        // Dacă versiunea stocată e diferită de cea curentă (utilizator nou sau versiune veche)
        if (storedVersion !== BUILD_VERSION) {
          console.log('[PWA_VERSION] Version mismatch: stored=' + storedVersion + ', build=' + BUILD_VERSION);
          
          // Salvează versiunea nouă ÎNAINTE de orice altceva pentru a preveni loop infinit
          localStorage.setItem('yana_app_version', BUILD_VERSION);
          
          // Colectăm toate promisiunile de curățare
          var cleanupPromises = [];
          
          // Curăță Service Worker-uri
          if ('serviceWorker' in navigator) {
            cleanupPromises.push(
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                return Promise.all(registrations.map(function(registration) {
                  console.log('[PWA_VERSION] Unregistering SW:', registration.scope);
                  return registration.unregister();
                }));
              }).catch(function(err) {
                console.log('[PWA_VERSION] SW cleanup error:', err);
              })
            );
          }
          
          // Curăță toate cache-urile
          if ('caches' in window) {
            cleanupPromises.push(
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(name) { 
                  console.log('[PWA_VERSION] Deleting cache:', name);
                  return caches.delete(name);
                }));
              }).catch(function(err) {
                console.log('[PWA_VERSION] Cache cleanup error:', err);
              })
            );
          }
          
          // După ce toate cache-urile sunt curățate, facem reload
          // Funcționează atât pentru utilizatori noi cât și pentru cei existenți
          if (cleanupPromises.length > 0) {
            Promise.all(cleanupPromises).then(function() {
              console.log('[PWA_VERSION] All caches cleared, reloading...');
              window.location.reload();
            });
          } else {
            // Niciun cache de curățat, doar reload
            console.log('[PWA_VERSION] No caches to clear, reloading...');
            window.location.reload();
          }
        }
      })();
    </script>
